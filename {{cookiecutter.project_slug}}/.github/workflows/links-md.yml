name: Docs links (Markdown)

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - ".lychee.toml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - ".lychee.toml"

concurrency:
  group: {% raw %}${{ github.workflow }}-md${{ github.ref }}{% endraw %}
  cancel-in-progress: true

jobs:
  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: cache-lychee-md-{% raw %}${{ github.sha }}{% endraw %}
          restore-keys: cache-lychee-md-

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
        with:
          fail: true
          args: >-
            --config .lychee.toml
            --cache
            --no-progress
            README.md
            'docs/**/*.md'

      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .lycheecache
          key: {% raw %}${{ steps.restore-cache.outputs.cache-primary-key || format('cache-lychee-md-{0}', github.sha) }}{% endraw %}
